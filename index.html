<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSE Farewell Party</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

.container {
  padding: 40px 20px;
  animation: fadeIn 2s ease-in;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  margin: 20px auto;
  border-radius: 12px;
  max-width: 500px;
  backdrop-filter: blur(10px);
}

.button {
  display: inline-block;
  padding: 12px 25px;
  background: #ff9800;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  transition: 0.3s;
}

.button:hover {
  background: #ffa726;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* Countdown */
#countdown {
  font-size: 24px;
  margin-top: 10px;
  color: #ffd54f;
}
</style>
</head>

<body>

<div class="container">

  <h1>🎓 CSE Farewell Party</h1>
  <p>Tirumala Engineering College</p>

  <div class="card">
    <p>📅 April 13 | ⏰ 9:00 AM</p>
    <p>📍 CSE Seminar Hall</p>
  </div>

  <div class="card">
    <p><em>"The roots you built here will grow wherever you go"</em></p>
  </div>

  <div class="card">
    <h3>⏳ Countdown</h3>
    <div id="countdown"></div>
  </div>

  <div class="card">
    <a class="button" href="https://forms.gle/" target="_blank">
      RSVP Now
    </a>
  </div>

</div>

<!-- 🎶 Background Music -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mp3">
</audio>

<!-- ⏳ Countdown Script -->
<script>
const eventDate = new Date("April 13, 2026 09:00:00").getTime();

const timer = setInterval(function() {
  const now = new Date().getTime();
  const distance = eventDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((distance / 1000 / 60) % 60);
  const seconds = Math.floor((distance / 1000) % 60);

  document.getElementById("countdown").innerHTML =
    days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

  if (distance < 0) {
    clearInterval(timer);
    document.getElementById("countdown").innerHTML = "🎉 Event Started!";
  }
}, 1000);
</script>

</body>
</html>
